<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Randomizador agentes Valorant</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
    --bg: #0f172a;
    --card: #0b1220;
    --accent: #7c3aed;
    --muted: #94a3b8;
    --text: #e6eef8;
}
body {
    font-family: Inter, sans-serif;
    margin: 0;
    background: linear-gradient(180deg, #071028 0%, #071229 60%);
    color: var(--text);
    padding: 28px;
    min-height: 100vh;
}
.container { max-width: 1500px; margin: 0 auto; }
header { margin-bottom: 18px; }
h1 { font-size: 20px; margin: 0; }
p.lead { color: var(--muted); font-size: 13px; margin: 0; }
    .cards-container {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}
#teamCard, #roleCard {
    flex: 1 1 45%;
}
@media (max-width: 768px) {
    #teamCard, #roleCard {
        flex: 1 1 100%;
    }
}
#shareUrl {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: transparent;
    color: var(--text);
    font-size: 14px;
    box-sizing: border-box;
}
.card {
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
    padding: 14px;
    border-radius: 10px;
    box-shadow: 0 6px 18px rgba(2, 6, 23, 0.6);
    margin-bottom: 12px;
}
label, .heading { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }
input[type="text"], input[type="number"], textarea {
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.04);
    background: transparent;
    color: var(--text);
    outline: none;
    font-size: 14px;
}
.player-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
}
.remove-btn {
    background: transparent;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 6px;
}
.remove-btn:hover { color: #ffb4b4; }
button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
}
button.ghost {
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.06);
    color: var(--text);
}
#results { 
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: flex-start;
}
.assignment {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 10px;
    border-radius: 8px;
    background: #1a222d;
    flex: 0 0 calc(20% - 0.8rem); /* 5 elementos por fila menos el gap */
    box-sizing: border-box;
}
@media (max-width: 1200px) {
    .assignment { flex: 0 0 calc(25% - 0.75rem); } /* 4 por fila */
}
@media (max-width: 900px) {
    .assignment { flex: 0 0 calc(33.33% - 0.67rem); } /* 3 por fila */
}
@media (max-width: 600px) {
    .assignment { flex: 0 0 calc(50% - 0.5rem); } /* 2 por fila */
}
@media (max-width: 400px) {
    .assignment { flex: 0 0 100%; } /* 1 por fila */
}
.small { font-size: 13px; color: var(--muted); }
.danger { color: #ffb4b4; }
.agent-info {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex-direction: column;
}
.agent-info > div {   
    display: flex;
    align-items: center;
    gap: 6px;
    flex-direction: column;
    width: 100%;
    background: #303a43;
    padding: .5rem;
    margin: 0;
    box-sizing: border-box;
    border: 1px solid white;
}
.agent-info img {
    width: 100%;
    object-fit: cover;
    aspect-ratio: 270 / 355;
    margin: 0;
    padding: 0;
    object-position: bottom;
}
</style>
</head>
<body>
<div class="container">
    <header>
        <h1>Randomizador agentes Valorant</h1>
        <p class="lead">Escribe los nombres del equipo y define la composición de roles.</p>
    </header>
    
    <div class="cards-container">
        <div class="card" id="teamCard">
            <p class="heading">Nombres del equipo</p>
            <div id="teamInputs"></div>
            <button id="addPlayerBtn" class="ghost" style="margin-top:8px;">+ Añadir jugador</button>
        </div>
    
        <div class="card" id="roleCard">
            <label><input type="checkbox" id="useRolesCheckbox"> Usar composición de roles</label>
            <div id="roleConfig" style="display:none; margin-top: 8px;"></div>
            <p class="small">Puedes ajustar cuántos jugadores de cada rol habrá en el equipo.</p>
        </div>
    </div>
    
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom: 1rem;">
        <button id="assignBtn">Asignar agentes</button>
        <button id="exportBtn" class="ghost" style="display: none;">Copiar</button>
        <div style="margin-left:auto" id="status" class="small"></div>
    </div>
    
    <div class="card" id="resultCard">
        <div id="results"></div>
    </div>
    
        <!-- Caja de URL -->
    <div class="card">
        <p class="heading">Compartir configuración</p>
        <input type="text" id="shareUrl" readonly placeholder="La URL aparecerá aquí">
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const roleMap = { "Duelist":"Duelista", "Sentinel":"Centinela", "Controller":"Controlador", "Initiator":"Iniciador" };
let roles = {};
let assignedAgents = [];
let playerCount = 0;

const teamInputsDiv = document.getElementById('teamInputs');
const addPlayerBtn = document.getElementById('addPlayerBtn');
const resultsDiv = document.getElementById('results');
const statusDiv = document.getElementById('status');
const roleConfigDiv = document.getElementById('roleConfig');
const useRolesCheckbox = document.getElementById('useRolesCheckbox');
const assignBtn = document.getElementById('assignBtn');
const exportBtn = document.getElementById('exportBtn');

// --- Fetch agents dynamically ---
async function loadAgents() {
    try {
        const res = await fetch("https://valorant-api.com/v1/agents?isPlayableCharacter=true");
        const data = await res.json();
        roles = {};

        data.data.forEach(agent => {
            const roleName = agent.role?.displayName || "Sin rol";
            const roleES = roleMap[roleName] || roleName;
            if (!roles[roleES]) roles[roleES] = {};
            roles[roleES][agent.displayName] = agent.fullPortrait || agent.displayIcon || "";
        });

        console.log("DEBUG API - roles y agentes cargados desde API:", roles);

        renderRoleConfig();
    } catch (err) {
        console.error("Error cargando agentes", err);
        statusDiv.textContent = "Error cargando agentes desde la API";
    }
}

// --- Render players ---
function renderPlayers(names = []) {
    teamInputsDiv.innerHTML = '';
    const usedNames = new Set();
    playerCount = names.length || 1;

    names.forEach((name,i) => {
        let displayName = name || `Jugador ${i+1}`;
        let suffix = 1;
        while(usedNames.has(displayName)) {
            displayName = `${name}_${suffix++}`;
        }
        usedNames.add(displayName);

        const row = document.createElement('div');
        row.className = 'player-row';

        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `Jugador ${i+1}`;
        input.value = displayName;

        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '✖';
        removeBtn.addEventListener('click', () => {
            const remaining = Array.from(teamInputsDiv.querySelectorAll('input')).map(i => i.value);
            remaining.splice(i,1);
            renderPlayers(remaining);
        });

        row.appendChild(input);
        row.appendChild(removeBtn);
        teamInputsDiv.appendChild(row);
    });

    addPlayerBtn.style.display = playerCount < 5 ? 'inline-block' : 'none';
    updateShareUrl();
}

// --- Add player ---
addPlayerBtn.onclick = () => {
    const inputs = Array.from(teamInputsDiv.querySelectorAll('input'));
    if (inputs.length < 5) {
        const currentNames = inputs.map(i => i.value.trim());
        let nextName = `Jugador ${currentNames.length+1}`;
        while(currentNames.includes(nextName)) nextName += "_1";
        currentNames.push(nextName);
        renderPlayers(currentNames);
    }
};

// --- Render role config ---
function renderRoleConfig(initialRoles = {}) {
    roleConfigDiv.innerHTML = '';
    for(const role in roles){
        const div = document.createElement('div');
        div.className = 'player-row';
        const label = document.createElement('label');
        label.textContent = role;
        label.style.width = '120px';
        const input = document.createElement('input');
        input.type = 'number';
        input.min = 0;
        input.max = 5;
        input.value = initialRoles[role] !== undefined ? initialRoles[role] : 0;
        input.id = `role-${role}`;
        div.appendChild(label);
        div.appendChild(input);
        roleConfigDiv.appendChild(div);
    }
    updateShareUrl();
}

function limitRolesInputs() {
    const teamSize = getTeamNames().length;
    const roleInputs = Array.from(roleConfigDiv.querySelectorAll('input[type="number"]'));
    let total = roleInputs.reduce((sum, input) => sum + Number(input.value), 0);
    if (total > teamSize) {
        for (let i = roleInputs.length - 1; i >= 0 && total > teamSize; i--) {
            let val = Number(roleInputs[i].value);
            if (val > 0) {
                let reduceBy = Math.min(val, total - teamSize);
                roleInputs[i].value = val - reduceBy;
                total -= reduceBy;
            }
        }
    }
    roleInputs.forEach(input => {
        const currentVal = Number(input.value);
        input.max = currentVal + (teamSize - total);
    });
}

// --- Shuffle ---
function shuffle(arr) {
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
}

function updateShareUrl() {
    const teamNames = getTeamNames();
    console.log("DEBUG - teamNames:", teamNames);

    const jugadoresParam = teamNames.map(name => encodeURIComponent(name)).join(';');
    console.log("DEBUG - jugadoresParam:", jugadoresParam);

    let rolesParam = '';
    if (useRolesCheckbox.checked) {
        const roleInputs = Array.from(roleConfigDiv.querySelectorAll('input[type="number"]'));
        console.log("DEBUG - roleInputs encontrados:", roleInputs);

        rolesParam = roleInputs
            .map(input => {
                const roleName = input.id.replace('role-', '');
                const value = Number(input.value) || 0;
                console.log("DEBUG - role:", roleName, "value:", value);
                return `${encodeURIComponent(roleName)}:${value}`;
            })
            .join(';');

        console.log("DEBUG - rolesParam:", rolesParam);
    } else {
        console.log("DEBUG - checkbox de roles no está activado");
    }

    const baseUrl = window.location.origin + window.location.pathname;
    const url = rolesParam
        ? `${baseUrl}?jugadores=${jugadoresParam}&roles=${rolesParam}`
        : `${baseUrl}?jugadores=${jugadoresParam}`;

    console.log("DEBUG - URL final:", url);

    document.getElementById('shareUrl').value = url;
}
    
// --- Get team names ---
function getTeamNames(){
    return Array.from(teamInputsDiv.querySelectorAll('input')).map(i=>i.value.trim());
}

// --- Get role by agent ---
function getRoleByAgent(agentName){
    for(const role in roles){
        if(roles[role][agentName]) return role;
    }
    return 'Desconocido';
}

// --- Get icon by agent ---
function getIconByAgent(agentName){
    for(const role in roles){
        if(roles[role][agentName]) return roles[role][agentName];
    }
    return '';
}

// --- Assign agents ---
function assignAgents(specificPlayer = null){
    statusDiv.textContent = '';
    const team = getTeamNames();

    // Si no hay asignaciones previas, inicializamos
    if (!assignedAgents.length) assignedAgents = [];

    if(useRolesCheckbox.checked){
        // Pool completo de agentes
        const agentPool = Object.entries(roles).flatMap(([role, agentsObj]) =>
            Object.keys(agentsObj).map(agent => ({ agent, role }))
        );

        if(specificPlayer !== null){
            // reroll individual
            const currentRole = assignedAgents[specificPlayer].role;
            const takenAgents = assignedAgents.map(a => a?.agent).filter(Boolean);
            const validAgents = agentPool
                .filter(a => a.role === currentRole && !takenAgents.includes(a.agent));
            if(validAgents.length === 0){
                statusDiv.innerHTML = `<span class="danger">No hay más agentes disponibles para el rol "${currentRole}"</span>`;
                return;
            }
            const pick = validAgents[Math.floor(Math.random()*validAgents.length)];
            assignedAgents[specificPlayer] = {
                ...assignedAgents[specificPlayer],
                agent: pick.agent,
                icon: getIconByAgent(pick.agent)
            };
        } else {
            // asignación completa
            const composition = {};
            let totalNeeded = 0;
            for(const role in roles){
                const val = parseInt(document.getElementById(`role-${role}`)?.value) || 0;
                composition[role] = val;
                totalNeeded += val;
            }
            if(totalNeeded !== team.length){
                statusDiv.innerHTML = `<span class="danger">Error: suma de roles (${totalNeeded}) != jugadores (${team.length})</span>`;
                return;
            }

            // verificar disponibilidad
            for(const role in composition){
                const available = agentPool.filter(a => a.role === role).length;
                if(composition[role] > available){
                    statusDiv.innerHTML = `<span class="danger">Error: no hay suficientes agentes para el rol "${role}"</span>`;
                    return;
                }
            }

            // asignar todos
            const tempComposition = {...composition};
            team.forEach((player, i) => {
                const validAgents = agentPool.filter(a => tempComposition[a.role] > 0 && !assignedAgents.find(x => x?.agent === a.agent));
                const pick = validAgents[Math.floor(Math.random()*validAgents.length)];
                assignedAgents[i] = {
                    name: player,
                    agent: pick.agent,
                    role: pick.role,
                    icon: getIconByAgent(pick.agent)
                };
                tempComposition[pick.role]--;
            });
        }

    } else {
        // modo sin roles
        const allAgents = Object.values(roles).flatMap(a=>Object.keys(a));
        if(team.length > allAgents.length){
            statusDiv.innerHTML = `<span class="danger">Error: más jugadores que agentes disponibles</span>`;
            return;
        }

        if(specificPlayer !== null){
            const takenAgents = assignedAgents.map(a => a?.agent).filter(Boolean);
            const validAgents = allAgents.filter(a => !takenAgents.includes(a));
            if(validAgents.length === 0){
                statusDiv.innerHTML = `<span class="danger">No hay más agentes disponibles</span>`;
                return;
            }
            const pick = validAgents[Math.floor(Math.random()*validAgents.length)];
            assignedAgents[specificPlayer] = {
                ...assignedAgents[specificPlayer],
                agent: pick,
                role: getRoleByAgent(pick),
                icon: getIconByAgent(pick)
            };
        } else {
            const shuffled = shuffle(allAgents);
            team.forEach((player,i)=>{
                assignedAgents[i] = {
                    name: player,
                    agent: shuffled[i],
                    role: getRoleByAgent(shuffled[i]),
                    icon: getIconByAgent(shuffled[i])
                };
            });
        }
    }

    renderAssignments();
}

// --- Render assignments ---
function renderAssignments(){
    resultsDiv.innerHTML='';
    assignedAgents.forEach((a,idx)=>{
        const row = document.createElement('div');
        row.className='assignment';
        row.innerHTML=`
            <div style="display:flex; justify-content:space-between; width:100%;">
                <strong>${a.name}</strong>
                <button style="font-size:12px; cursor:pointer;">Reroll</button>
            </div>
            <div class="agent-info">
                <img src="${a.icon}" alt="${a.agent}">
                <div>
                    <strong>${a.agent}</strong>
                    <div class="small" style="display:flex; flex-direction:column;">${a.role}</div>
                </div>
            </div>
        `;
        // Reroll individual
        row.querySelector('button').onclick=()=>assignAgents(idx);
        resultsDiv.appendChild(row);
    });
    statusDiv.textContent='Asignación creada — '+new Date().toLocaleTimeString();
    exportBtn.style.display='inline-block';
}

// --- Convertir imagen remota a Base64 ---
async function imgToBase64(url) {
    try {
        const res = await fetch(url, { mode: 'cors' });
        const blob = await res.blob();
        return await new Promise(resolve => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        });
    } catch (err) {
        console.error("Error convirtiendo imagen a Base64:", err);
        return url; // fallback: dejar la URL original
    }
}


// --- Export / Copiar ---
exportBtn.onclick = async () => {
    const div = document.getElementById('resultCard');
    statusDiv.textContent = 'Preparando imágenes...';
    const imgElements = div.querySelectorAll('img');
    const promises = Array.from(imgElements).map(async img => {
        if (img.src && !img.src.startsWith('data:')) {
            img.src = await imgToBase64(img.src);
        }
    });
    try {
        await Promise.all(promises);

        statusDiv.textContent = 'Generando imagen...';
        const canvas = await html2canvas(div, { backgroundColor: null, useCORS: true });
        canvas.toBlob(async blob => {
            if (!blob) return;
            try {
                await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                statusDiv.textContent = 'Imagen copiada al portapapeles 🎉';
            } catch (err) {
                console.error(err);
                statusDiv.textContent = 'Error: no se pudo copiar';
            }
        });
    } catch (err) {
        console.error(err);
        statusDiv.textContent = 'Error generando imagen';
    }
};

// --- Obtener jugadores y roles desde URL ---
function getPlayersAndRolesFromUrl() {
    const params = new URLSearchParams(window.location.search);

    // jugadores
    const jugadoresParam = params.get('jugadores');
    const jugadores = jugadoresParam
        ? jugadoresParam.split(';').map(j => decodeURIComponent(j.trim())).filter(j => j.length)
        : [];

    // roles: NombreRol:Cantidad
    const rolesFromUrl = {};
    const rolesParam = params.get('roles');
    if (rolesParam) {
        rolesParam.split(';').forEach(pair => {
            const [roleName, countStr] = pair.split(':').map(p => p.trim());
            if (roleName && countStr) rolesFromUrl[decodeURIComponent(roleName)] = parseInt(countStr);
        });
    }

    return { jugadores, roles: rolesFromUrl };
}

// --- Initialize ---
useRolesCheckbox.addEventListener('change', () => {
    roleConfigDiv.style.display = useRolesCheckbox.checked ? 'block' : 'none';
    updateShareUrl();
});

const { jugadores: initialPlayers, roles: initialRoles } = getPlayersAndRolesFromUrl();

await loadAgents();
    
await renderPlayers(initialPlayers.length ? initialPlayers : ['Jugador 1']);
await renderRoleConfig(initialRoles);
limitRolesInputs();

teamInputsDiv.addEventListener('input', updateShareUrl);
roleConfigDiv.addEventListener('input', () => {
    limitRolesInputs();
    updateShareUrl();
});

// Si hay roles en la URL, preseleccionarlos
if (Object.keys(initialRoles).length) {
    useRolesCheckbox.checked = true;
    roleConfigDiv.style.display = 'block';
    Object.entries(initialRoles).forEach(([role, val]) => {
        const input = document.getElementById(`role-${role}`);
        if (input) input.value = val;
        else console.warn("Role input no encontrado para:", role); // debug
    });
}

assignBtn.onclick = () => assignAgents();

updateShareUrl();

});
</script>
</body>
</html>
